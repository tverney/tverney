name: Update GitHub Stats Cards

on:
  schedule:
    # Runs daily at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create output directory
        run: mkdir -p generated

      - name: Generate GitHub Stats SVG
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: generated/github-stats.svg
          user: tverney
          template: classic
          base: header, activity, community, repositories
          config_display: large
          config_timezone: America/Chicago

      - name: Generate Top Languages SVG
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: generated/top-langs.svg
          user: tverney
          template: classic
          base: ""
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_recent_categories: markup, programming
          plugin_languages_recent_days: 14
          plugin_languages_recent_load: 300
          plugin_languages_sections: most-used
          plugin_languages_threshold: 0%

      - name: Generate Streak Stats SVG
        uses: be-next/github-streak-stats-action@v1
        with:
          username: tverney
          token: ${{ secrets.GITHUB_TOKEN }}
          output-path: generated/streak-stats.svg
          theme: tokyonight
          hide-border: true

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add generated/*.svg
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: update GitHub stats cards [skip ci]"
          git push
